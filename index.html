<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Professional Furniture Catalog</title>
</head>
<body>
    <header>
        <h1>Professional Furniture Catalog</h1>
        <input type="text" id="search" placeholder="Search for furniture...">
        <input type="number" id="minPrice" placeholder="Min Price" onchange="filterByPrice()">
        <input type="number" id="maxPrice" placeholder="Max Price" onchange="filterByPrice()">
    </header>
    <main id="catalog">
        <div class="furniture-item" style="animation: fadeIn 1s;">
            <img src="chair.jpg" alt="Wooden Chair">
            <h2>Wooden Chair</h2>
            <p>Price: $100</p>
        </div>
        <div class="furniture-item" style="animation: fadeIn 1s;">
            <img src="table.jpg" alt="Dining Table">
            <h2>Dining Table</h2>
            <p>Price: $300</p>
        </div>
        <div class="furniture-item" style="animation: fadeIn 1s;">
            <img src="sofa.jpg" alt="Leather Sofa">
            <h2>Leather Sofa</h2>
            <p>Price: $600</p>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Professional Furniture Catalog</p>
    </footer>
    <script>
        const filterByPrice = () => {
            const minPrice = document.getElementById('minPrice').value;
            const maxPrice = document.getElementById('maxPrice').value;
            const items = document.querySelectorAll('.furniture-item');
            items.forEach(item => {
                const priceText = item.querySelector('p').innerText;
                const price = parseFloat(priceText.replace('Price: $', ''));
                if ((minPrice === '' || price >= minPrice) && (maxPrice === '' || price <= maxPrice)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        };
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        #catalog {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .furniture-item {
            margin: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        .furniture-item:hover {
            transform: scale(1.05);
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: #fff;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</body>
</html>
